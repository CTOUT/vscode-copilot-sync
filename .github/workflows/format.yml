name: Format check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v4.2.0
        with:
          node-version: 22
      - run: npx prettier --check "."
