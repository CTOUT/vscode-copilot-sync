name: Question & Answer
description: Ask the community or maintainers a question about using or configuring this repository
title: "[Q&A]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Welcome! Please search existing discussions or issues before asking a new question.
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: Describe what you are trying to accomplish and what question you have.
      placeholder: How do I configure...
    validations:
      required: true
